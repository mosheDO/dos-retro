<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOS Retro</title>
<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a1a2e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #e94560; }
  header h1 { font-size: 20px; color: #e94560; }
  header span { color: #888; font-size: 13px; }
  #game-list { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 20px; background: #16213e; border-bottom: 1px solid #333; }
  .game-btn { background: #0f3460; color: #eee; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .game-btn:hover { background: #e94560; }
  .game-btn.active { background: #e94560; border-color: #e94560; }
  #dos-container { flex: 1; position: relative; background: #000; }
  #dos-container > div { width: 100% !important; height: 100% !important; }
  #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 18px; flex-direction: column; gap: 8px; z-index: 1; pointer-events: none; }
  #placeholder small { font-size: 13px; color: #444; }
</style>
</head>
<body>

<header>
  <h1>DOS Retro</h1>
  <span>play classic DOS games in your browser</span>
</header>

<div id="game-list"></div>

<div id="dos-container">
  <div id="placeholder">
    <div>Select a game to play</div>
    <small>jsDOS will load and run it in-browser</small>
  </div>
</div>

<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<script>
const RAW = "https://raw.githubusercontent.com/mosheDO/next-challenge-200-plus/master";

const GAMES = [
  {
    id: "greedy",
    title: "Greedy",
    subtitle: "Pac-Man clone (1996)",
    command: "GREEDY.EXE",
    files: [
      { path: "GREEDY.EXE", url: RAW + "/ARCADE/PACMAN/GREEDY.EXE" },
      { path: "GREEDY.CUS", url: RAW + "/ARCADE/PACMAN/GREEDY.CUS" },
      { path: "GREEDY.FR", url: RAW + "/ARCADE/PACMAN/GREEDY.FR" },
      { path: "GREEDY.US", url: RAW + "/ARCADE/PACMAN/GREEDY.US" },
      { path: "GREEDFIX.COM", url: RAW + "/ARCADE/PACMAN/GREEDFIX.COM" },
      { path: "GREEDY.BA1", url: RAW + "/ARCADE/PACMAN/Greedy%20(1996).ba1" },
    ]
  },
  {
    id: "speed-haste",
    title: "Speed Haste",
    subtitle: "Racing (1996)",
    command: "SPEED.EXE",
    files: [
      { path: "SPEED.EXE", url: RAW + "/DRIVING/SPEED/SPEED.EXE" },
      { path: "DOS4GW.EXE", url: RAW + "/DRIVING/SPEED/DOS4GW.EXE" },
      { path: "SPEED.CFG", url: RAW + "/DRIVING/SPEED/SPEED.CFG" },
    ]
  },
  {
    id: "ddave",
    title: "Dangerous Dave",
    subtitle: "Platformer (1990)",
    command: "DAVE.EXE",
    files: [
      { path: "DAVE.EXE", url: RAW + "/LEVELS/DDAVE/DAVE.EXE" },
      { path: "DSCORES.DAV", url: RAW + "/LEVELS/DDAVE/DSCORES.DAV" },
    ],
    dosboxConf: [
      "[sdl]",
      "fullscreen=false",
      "",
      "[dosbox]",
      "machine=ega",
      "memsize=4",
      "",
      "[cpu]",
      "core=normal",
      "cputype=386",
      "cycles=fixed 1000",
      "",
      "[render]",
      "aspect=true",
      "",
      "[autoexec]",
      "mount c .",
      "c:",
      "DAVE.EXE",
      "exit",
    ].join("\n")
  },
  {
    id: "pako",
    title: "PAKO II",
    subtitle: "Pac-Man clone (1996)",
    command: "pako.exe",
    files: [
      { path: "pako.exe", url: RAW + "/ARCADE/PAKO/pako.exe" },
      { path: "PAKO2.D01", url: RAW + "/ARCADE/PAKO/PAKO2.D01" },
      { path: "PAKO2.D02", url: RAW + "/ARCADE/PAKO/PAKO2.D02" },
      { path: "PAKO2.D03", url: RAW + "/ARCADE/PAKO/PAKO2.D03" },
      { path: "PAKO2.D04", url: RAW + "/ARCADE/PAKO/PAKO2.D04" },
      { path: "PAKO2.D05", url: RAW + "/ARCADE/PAKO/PAKO2.D05" },
      { path: "PAKO2.HI", url: RAW + "/ARCADE/PAKO/PAKO2.HI" },
    ]
  }
];

const container = document.getElementById("dos-container");
const list = document.getElementById("game-list");
const placeholder = document.getElementById("placeholder");

let currentDos = null;

function dosboxConf(command) {
  return [
    "[sdl]",
    "fullscreen=false",
    "output=overlay",
    "",
    "[dosbox]",
    "machine=svga_s3",
    "memsize=16",
    "",
    "[render]",
    "aspect=true",
    "scaler=normal2x",
    "",
    "[cpu]",
    "core=auto",
    "cycles=auto",
    "",
    "[autoexec]",
    "mount c .",
    "c:",
    command,
    "exit",
  ].join("\n");
}

function renderGames() {
  list.innerHTML = "";
  for (const game of GAMES) {
    const btn = document.createElement("button");
    btn.className = "game-btn";
    btn.textContent = game.title;
    btn.title = game.subtitle;
    btn.onclick = () => launchGame(game);
    list.appendChild(btn);
  }
}

async function launchGame(game) {
  if (currentDos) {
    currentDos.stop();
    currentDos = null;
  }

  placeholder.style.display = "flex";
  placeholder.innerHTML = "<div>Loading " + game.title + "...</div>";

  for (const btn of list.children) {
    btn.classList.remove("active");
    if (btn.textContent === game.title) btn.classList.add("active");
  }

  try {
    const initFs = await Promise.all(game.files.map(async (f) => {
      const resp = await fetch(f.url);
      if (!resp.ok) throw new Error("Failed to fetch " + f.path);
      const buf = await resp.arrayBuffer();
      return { path: f.path, contents: new Uint8Array(buf) };
    }));

    currentDos = Dos(container, {
      dosboxConf: game.dosboxConf || dosboxConf(game.command),
      initFs,
      autoStart: true,
      onEvent: (event) => {
        if (event === "ci-ready") {
          placeholder.style.display = "none";
        }
      },
    });
  } catch (e) {
    placeholder.innerHTML = "<div style='color:#e94560'>Error: " + e.message + "</div>";
  }
}

renderGames();
</script>
</body>
</html>
