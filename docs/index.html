  body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }

  #game-list { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 20px; background: #16213e; border-bottom: 1px solid #333; }
  .game-btn { background: #0f3460; color: #eee; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .game-btn:hover { background: #e94560; }
  .game-btn.active { background: #e94560; border-color: #e94560; }
  #dos-container { flex: 1; position: relative; background: #000; }
  #dos-container > div { width: 100% !important; height: 100% !important; }
  #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 18px; flex-direction: column; gap: 8px; z-index: 1; pointer-events: none; }
  #placeholder small { font-size: 13px; color: #444; }

const container = document.getElementById("dos-container");
const list = document.getElementById("game-list");
const placeholder = document.getElementById("placeholder");

let currentDos = null;

function parseIni(text) {
  const obj = {};
  let section = null;
  for (const line of text.split("\n")) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const m = trimmed.match(/^\[(.+)\]$/);
    if (m) { section = m[1]; if (!obj[section]) obj[section] = {}; continue; }
    const kv = trimmed.match(/^(\w+)=(.*)$/);
    if (kv && section) { obj[section][kv[1]] = kv[2]; continue; }
    if (section) {
      if (!obj[section]._lines) obj[section]._lines = [];
      obj[section]._lines.push(trimmed);
    }
  }
  return obj;
}

function serializeIni(obj) {
  const parts = [];
  for (const [section, keys] of Object.entries(obj)) {
    parts.push("[" + section + "]");
    for (const [k, v] of Object.entries(keys)) {
      if (k === "_lines") continue;
      parts.push(k + "=" + v);
    }
    if (keys._lines) {
      for (const line of keys._lines) parts.push(line);
    }
    parts.push("");
  }
  while (parts.length > 0 && parts[parts.length - 1] === "") parts.pop();
  return parts.join("\n");
}

function defaultConf(command) {
  return {
    sdl: { fullscreen: "false", output: "overlay" },
    dosbox: { machine: "svga_s3", memsize: "16" },
    render: { aspect: "true", scaler: "normal2x" },
    cpu: { core: "auto", cycles: "auto" },
    autoexec: { _lines: ["mount c .", "c:", command, "exit"] }
  };
}

function mergeConfigs(base, override) {
  const result = {};
  for (const section of Object.keys(base)) result[section] = { ...base[section] };
  for (const section of Object.keys(override)) {
    if (!result[section]) result[section] = {};
    if (override[section]._lines) result[section]._lines = override[section]._lines;
    for (const key of Object.keys(override[section])) {
      if (key === "_lines") continue;
      result[section][key] = override[section][key];
    }
  }
  return result;
}

function renderGames() {
  list.innerHTML = "";
  for (const game of GAMES) {
    const btn = document.createElement("button");
    btn.className = "game-btn";
    btn.textContent = game.title;
    btn.title = game.subtitle;
    btn.onclick = () => launchGame(game);
    list.appendChild(btn);
  }
}

async function launchGame(game) {
  if (currentDos) {
    currentDos.stop();
    currentDos = null;
  }

  placeholder.style.display = "flex";
  placeholder.innerHTML = "<div>Loading " + game.title + "...</div>";

  for (const btn of list.children) {
    btn.classList.remove("active");
    if (btn.textContent === game.title) btn.classList.add("active");
  }

  try {
    const initFs = await Promise.all(game.files.map(async (f) => {
      const resp = await fetch(f.url);
      if (!resp.ok) throw new Error("Failed to fetch " + f.path);
      const buf = await resp.arrayBuffer();
      return { path: f.path, contents: new Uint8Array(buf) };
    }));

    const base = defaultConf(game.command);
    const overrides = game.dosboxConf ? parseIni(game.dosboxConf) : {};
    const merged = mergeConfigs(base, overrides);

    currentDos = Dos(container, {
      dosboxConf: serializeIni(merged),
      initFs,
      autoStart: true,
      onEvent: (event) => {
        if (event === "ci-ready") {
          placeholder.style.display = "none";
        }
      },
    });
  } catch (e) {
    placeholder.innerHTML = "<div style='color:#e94560'>Error: " + e.message + "</div>";
  }
}
